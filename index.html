<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>古建筑斗拱拆解排布模拟</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/measurement.css">
  <link rel="stylesheet" href="css/import.css">
  <link rel="stylesheet" href="css/assemblyPlayer.css">
  <link rel="stylesheet" href="css/batch.css">
  <link rel="stylesheet" href="css/schemeVersion.css">
  <link rel="stylesheet" href="css/componentDetail.css">
  <link rel="stylesheet" href="css/preview3D.css">
  <script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
  <script src="https://unpkg.com/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>
  <header>
    <div><h1>古建筑斗拱拆解排布模拟</h1><div>拖拽构件到画布，设置层级和连接点，检查装配关系。</div></div>
    <div><button id="saveBtn">保存方案</button> <button id="importBtn" class="secondary">导入JSON</button> <input id="importFileInput" type="file" accept=".json,application/json" style="display:none"> <button id="exportBtn" class="secondary">导出JSON</button></div>
  </header>
  <main class="app">
    <aside class="panel">
      <h2>铺作模板库</h2>
      <div class="templateLibrary" id="templateLibrary"></div>
      <h2>构件库</h2>
      <div class="library" id="library"></div>
      <h2>视图</h2>
      <button id="viewToggleBtn" class="secondary">切换3D预览</button>
      <button id="explodeBtn" class="secondary">切换爆炸图</button>
      <label>缩放</label><input id="zoom" type="range" min="45" max="110" value="75">
      <h2>尺寸标注</h2>
      <button id="measureBtn" class="secondary">测量模式</button>
      <div id="measurementPanel"></div>
      <h2>约束驱动自动排布</h2>
      <div id="autoLayoutPanel"></div>
      <h2>对称生成与批量排布</h2>
      <div id="batchPanel"></div>
      <h2>方案版本管理</h2>
      <div id="schemeVersionPanel"></div>
    </aside>
    <section class="panel canvasWrap">
      <div id="playerControls"></div>
      <div class="canvas" id="canvas"></div>
      <div class="canvas3D-wrap" id="canvas3DWrap">
        <div class="canvas3D-hint">拖拽旋转 · 滚轮缩放 · 右键平移</div>
        <canvas class="canvas3D" id="canvas3D"></canvas>
      </div>
    </section>
    <aside class="panel">
      <h2>装配步骤演示</h2>
      <div id="playerStepInfo"></div>
      <h2>当前构件</h2>
      <div id="editor">请选择构件。</div>
      <h2>层级结构</h2>
      <div class="tree" id="tree"></div>
      <h2>装配检查</h2>
      <div class="checks" id="checks"></div>
    </aside>
  </main>
  <script src="js/templates.js"></script>
  <script src="js/assemblyRules.js"></script>
  <script src="js/assemblyChecker.js"></script>
  <script src="js/selectionManager.js"></script>
  <script src="js/geometryTransform.js"></script>
  <script src="js/batchPanel.js"></script>
  <script src="js/measurementState.js"></script>
  <script src="js/measurementSerializer.js"></script>
  <script src="js/annotationRenderer.js"></script>
  <script src="js/componentData.js"></script>
  <script src="js/componentDetailRenderer.js"></script>
  <script src="js/componentEditor.js"></script>
  <script src="js/renderer.js"></script>
  <script src="js/assemblyStepCalculator.js"></script>
  <script src="js/assemblyPlayerState.js"></script>
  <script src="js/assemblyPlayerUI.js"></script>
  <script src="js/importParser.js"></script>
  <script src="js/importValidator.js"></script>
  <script src="js/importUI.js"></script>
  <script src="js/schemeStorage.js"></script>
  <script src="js/schemeState.js"></script>
  <script src="js/schemeVersionUI.js"></script>
  <script src="js/model3DBuilder.js"></script>
  <script src="js/threeScene.js"></script>
  <script src="js/preview3D.js"></script>
  <script src="js/autoLayoutConstraintModel.js"></script>
  <script src="js/autoLayoutEngine.js"></script>
  <script src="js/autoLayoutConflictDetector.js"></script>
  <script src="js/autoLayoutPanel.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
