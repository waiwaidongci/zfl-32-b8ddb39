<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>古建筑斗拱拆解排布模拟</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Arial, "PingFang SC", sans-serif; background: #eee9df; color: #252019; }
    header { padding: 16px 22px; background: #fffaf0; border-bottom: 1px solid #d8cbb8; display: flex; justify-content: space-between; gap: 14px; align-items: center; }
    h1 { margin: 0; font-size: 25px; }
    button { border: 0; border-radius: 8px; padding: 10px 13px; background: #8d3d2d; color: #fff; font-weight: 800; cursor: pointer; }
    button.secondary { background: #6f6458; }
    select, input { width: 100%; border: 1px solid #d8cbb8; border-radius: 6px; padding: 9px; font: inherit; background: #fff; }
    label { display: block; margin: 9px 0 5px; color: #76695c; font-size: 13px; }
    .app { display: grid; grid-template-columns: 250px 1fr 320px; gap: 16px; padding: 16px; }
    .panel { background: #fffaf0; border: 1px solid #d8cbb8; border-radius: 8px; padding: 14px; }
    .library { display: grid; gap: 8px; }
    .partBtn { text-align: left; background: #fff; color: #2b241c; border: 1px solid #d8cbb8; }
    .canvasWrap { overflow: hidden; min-height: 620px; position: relative; }
    .canvas { position: relative; width: 1200px; height: 760px; transform-origin: 0 0; background: linear-gradient(90deg, rgba(0,0,0,.05) 1px, transparent 1px), linear-gradient(rgba(0,0,0,.05) 1px, transparent 1px), #f6ead8; background-size: 40px 40px; border-radius: 8px; }
    .part { position: absolute; display: grid; place-items: center; color: #fff; font-weight: 800; cursor: move; border: 2px solid rgba(80,45,25,.35); box-shadow: 0 8px 18px rgba(60,35,20,.18); }
    .part.selected { outline: 4px solid rgba(219,170,64,.75); }
    .栌斗 { width: 74px; height: 52px; background: #8f4b31; border-radius: 8px; }
    .华拱 { width: 124px; height: 34px; background: #a96838; border-radius: 18px; }
    .昂 { width: 112px; height: 28px; background: #7d5b32; transform: skewX(-16deg); }
    .耍头 { width: 92px; height: 32px; background: #9b6c42; border-radius: 8px 22px 22px 8px; }
    .散斗 { width: 48px; height: 38px; background: #6d4d37; border-radius: 6px; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .tree, .checks { display: grid; gap: 8px; max-height: 260px; overflow: auto; }
    .item { border: 1px solid #d8cbb8; border-radius: 8px; padding: 8px; background: #fff; }
    .bad { color: #a1382f; font-weight: 800; }
    .ok { color: #3f7653; font-weight: 800; }
    .exploded .part { transform: translateY(var(--explode)) !important; }
    @media (max-width: 1050px) { header { display: block; } .app { grid-template-columns: 1fr; } .canvasWrap { min-height: 520px; } }
  </style>
</head>
<body>
  <header>
    <div><h1>古建筑斗拱拆解排布模拟</h1><div>拖拽构件到画布，设置层级和连接点，检查装配关系。</div></div>
    <div><button id="saveBtn">保存方案</button> <button id="exportBtn" class="secondary">导出JSON</button></div>
  </header>
  <main class="app">
    <aside class="panel">
      <h2>构件库</h2>
      <div class="library" id="library"></div>
      <h2>视图</h2>
      <button id="explodeBtn" class="secondary">切换爆炸图</button>
      <label>缩放</label><input id="zoom" type="range" min="45" max="110" value="75">
    </aside>
    <section class="panel canvasWrap"><div class="canvas" id="canvas"></div></section>
    <aside class="panel">
      <h2>当前构件</h2>
      <div id="editor">请选择构件。</div>
      <h2>层级结构</h2>
      <div class="tree" id="tree"></div>
      <h2>装配检查</h2>
      <div class="checks" id="checks"></div>
    </aside>
  </main>
  <script>
    const parts = ["栌斗","华拱","昂","耍头","散斗"];
    const canvas = document.querySelector("#canvas");
    const library = document.querySelector("#library");
    const editor = document.querySelector("#editor");
    const tree = document.querySelector("#tree");
    const checks = document.querySelector("#checks");
    let scheme = JSON.parse(localStorage.getItem("zfl32Scheme") || "null") || [
      { id: crypto.randomUUID(), type: "栌斗", x: 520, y: 520, layer: 1, dir: "正", connect: "柱头" },
      { id: crypto.randomUUID(), type: "华拱", x: 495, y: 450, layer: 2, dir: "正", connect: "下承" }
    ];
    let selected = "";
    let drag = null;
    library.innerHTML = parts.map(p => '<button class="partBtn" data-add="'+p+'">'+p+'</button>').join("");
    library.querySelectorAll("[data-add]").forEach(btn => btn.onclick = () => addPart(btn.dataset.add));
    function addPart(type) {
      scheme.push({ id: crypto.randomUUID(), type, x: 460 + Math.random()*120, y: 320 + Math.random()*80, layer: 1, dir: "正", connect: "" });
      render();
    }
    function render() {
      canvas.innerHTML = scheme.map(p => '<div class="part '+p.type+' '+(p.id===selected?'selected':'')+'" data-id="'+p.id+'" style="left:'+p.x+'px;top:'+p.y+'px;--explode:'+(-p.layer*34)+'px">'+p.type+'</div>').join("");
      canvas.querySelectorAll(".part").forEach(el => {
        el.onpointerdown = event => { selected = el.dataset.id; drag = { id: selected, ox: event.offsetX, oy: event.offsetY }; render(); };
      });
      renderEditor(); renderTree(); renderChecks();
    }
    window.onpointermove = event => {
      if (!drag) return;
      const rect = canvas.getBoundingClientRect();
      const item = scheme.find(p => p.id === drag.id);
      const zoom = Number(document.querySelector("#zoom").value) / 100;
      item.x = Math.round((event.clientX - rect.left) / zoom - drag.ox);
      item.y = Math.round((event.clientY - rect.top) / zoom - drag.oy);
      render();
    };
    window.onpointerup = () => drag = null;
    function renderEditor() {
      const p = scheme.find(x => x.id === selected);
      if (!p) { editor.innerHTML = "请选择构件。"; return; }
      editor.innerHTML = '<div class="item"><b>'+p.type+'</b><label>层级</label><input id="layerInput" type="number" min="1" max="8" value="'+p.layer+'"><label>方向</label><select id="dirInput"><option>正</option><option>左挑</option><option>右挑</option></select><label>连接点</label><input id="connectInput" value="'+p.connect+'"><button id="deleteBtn" class="secondary">删除构件</button></div>';
      document.querySelector("#dirInput").value = p.dir;
      document.querySelector("#layerInput").onchange = e => { p.layer = Number(e.target.value); render(); };
      document.querySelector("#dirInput").onchange = e => { p.dir = e.target.value; render(); };
      document.querySelector("#connectInput").oninput = e => { p.connect = e.target.value; renderTree(); renderChecks(); };
      document.querySelector("#deleteBtn").onclick = () => { scheme = scheme.filter(x => x.id !== p.id); selected = ""; render(); };
    }
    function renderTree() {
      const grouped = scheme.toSorted((a,b) => a.layer - b.layer);
      tree.innerHTML = grouped.map(p => '<div class="item">第'+p.layer+'层 · '+p.type+' · '+(p.connect || "未设连接")+'</div>').join("");
    }
    function renderChecks() {
      const issues = [];
      for (const p of scheme) {
        if (p.layer > 1 && !scheme.some(o => o.layer === p.layer - 1 && Math.abs(o.x - p.x) < 95 && Math.abs(o.y - p.y) < 95)) issues.push(p.type + "第" + p.layer + "层可能悬空");
        if (!p.connect) issues.push(p.type + "缺少连接点");
      }
      const counts = parts.map(type => type + "：" + scheme.filter(p => p.type === type).length).join(" / ");
      checks.innerHTML = '<div class="item">'+counts+'</div>' + (issues.length ? issues.map(i => '<div class="item bad">'+i+'</div>').join("") : '<div class="item ok">装配关系暂未发现明显问题。</div>');
    }
    document.querySelector("#zoom").oninput = e => canvas.style.transform = "scale("+(Number(e.target.value)/100)+")";
    document.querySelector("#zoom").dispatchEvent(new Event("input"));
    document.querySelector("#explodeBtn").onclick = () => canvas.classList.toggle("exploded");
    document.querySelector("#saveBtn").onclick = () => localStorage.setItem("zfl32Scheme", JSON.stringify(scheme));
    document.querySelector("#exportBtn").onclick = () => {
      const blob = new Blob([JSON.stringify(scheme, null, 2)], { type: "application/json" });
      const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = "dougong-scheme.json"; a.click(); URL.revokeObjectURL(a.href);
    };
    render();
  </script>
</body>
</html>
